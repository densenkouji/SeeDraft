<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
      --accent: rgba(255, 92, 102, 0.92);
      --accent-soft: rgba(255, 110, 120, 0.55);
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
      user-select: none;
    }
    body {
      opacity: 0;
      transform: translateY(6px) scale(0.96);
      transition: opacity 200ms ease, transform 240ms cubic-bezier(.2,.85,.25,1);
    }
    body.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .panel {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(28, 30, 36, 0.86), rgba(16, 18, 22, 0.78));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px) saturate(1.1);
      -webkit-backdrop-filter: blur(18px) saturate(1.1);
      overflow: hidden;
      transition: background 220ms ease;
    }
    body[data-mode="recording"] .panel {
      box-shadow:
        0 0 0 1px rgba(255, 92, 102, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    .hud {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 14px;
      align-items: center;
      padding: 0 22px 0 16px;
      z-index: 2;
    }
    .orb {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      position: relative;
      justify-self: center;
      background: radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.16), transparent 60%);
    }
    .orb::before {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow:
        0 0 14px var(--accent-soft),
        0 0 28px rgba(255, 92, 102, 0.30);
      animation: pulse 1.1s ease-in-out infinite alternate;
    }
    .orb::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid var(--accent-soft);
      opacity: 0;
      animation: ring 1.6s ease-out infinite;
    }
    body[data-mode="preparing"] .orb::before,
    body[data-mode="preparing"] .orb::after {
      animation: none;
    }
    body[data-mode="preparing"] .orb::before {
      background: rgba(220, 224, 230, 0.55);
      box-shadow: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 44px;
    }
    .processing {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 44px;
    }
    .processing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(232, 234, 238, 0.92);
      animation: process-pulse 1.1s ease-in-out infinite;
    }
    .processing span:nth-child(2) { animation-delay: 0.18s; }
    .processing span:nth-child(3) { animation-delay: 0.36s; }
    body[data-mode="processing"] canvas { display: none; }
    body[data-mode="processing"] .processing { display: flex; }
    body[data-mode="processing"] .orb::before {
      background: rgba(220, 224, 230, 0.65);
      box-shadow: none;
      animation: none;
    }
    body[data-mode="processing"] .orb::after { animation: none; opacity: 0; }
    @keyframes process-pulse {
      0%, 80%, 100% { transform: scale(0.55); opacity: 0.35; }
      40% { transform: scale(1); opacity: 1; }
    }
    @keyframes pulse {
      from { transform: scale(0.86); opacity: 0.85; }
      to { transform: scale(1.04); opacity: 1; }
    }
    @keyframes ring {
      0% { transform: scale(0.6); opacity: 0.55; }
      100% { transform: scale(1.35); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <div class="hud">
        <div class="orb" aria-hidden="true"></div>
        <canvas id="wave" width="180" height="44" aria-hidden="true"></canvas>
        <div class="processing" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </div>
  <script>
    const canvas = document.getElementById("wave");
    const ctx = canvas.getContext("2d");
    const bars = 34;
    const HOLD_RECORD_INSERT_AT_CURSOR_KEY = "seedraft_hold_record_insert_at_cursor";
    const HOLD_RECORD_OUTPUT_MODE_KEY = "seedraft_hold_record_output_mode";
    const MICROPHONE_DEVICE_KEY = "seedraft_microphone_device_id";
    const RECOGNITION_LANG_KEY = "seedraft_recognition_language";
    const SPEECH_MODEL_STORAGE_KEY = "seedraft_speech_model";

    const state = {
      recorder: null,
      chunks: [],
      starting: false,
      started: false,
      stopping: false,
      stopRequested: false,
      processing: false,
      stream: null
    };
    let audioContext = null;
    let analyser = null;
    let sourceNode = null;
    let audioData = null;
    let levels = Array.from({ length: bars }, () => 0.05);

    const getTauriInvoke = () =>
      window.__TAURI__?.core?.invoke || window.__TAURI__?.tauri?.invoke || null;

    const getTauriListen = () => window.__TAURI__?.event?.listen || null;

    const storageValue = (key) => {
      try { return (localStorage.getItem(key) || "").trim(); } catch { return ""; }
    };

    const holdRecordOutputMode = () => {
      const insert = storageValue(HOLD_RECORD_INSERT_AT_CURSOR_KEY);
      if (insert) return insert === "true" ? "both" : "copy";
      const legacyMode = storageValue(HOLD_RECORD_OUTPUT_MODE_KEY);
      if (legacyMode) return legacyMode === "insert" || legacyMode === "both" ? "both" : "copy";
      return "both";
    };

    const hideOverlayNow = () => {
      document.body.style.transition = "none";
      document.body.classList.remove("is-visible");
      document.body.dataset.mode = "hidden";
    };

    const hideNativeOverlay = () => {
      const invoke = getTauriInvoke();
      if (!invoke) return;
      invoke("hide_hold_recording_overlay").catch((error) => {
        console.warn("hold overlay hide failed", error);
      });
    };

    window.seedraftHoldOverlayShow = (mode = "preparing") => {
      document.body.style.transition = "";
      const wasVisible = document.body.classList.contains("is-visible");
      document.body.dataset.mode = mode;
      if (wasVisible) {
        // Mode change while already visible: keep the overlay on screen and
        // just swap the inner content (e.g. recording → processing).
        return;
      }
      document.body.classList.remove("is-visible");
      requestAnimationFrame(() => {
        requestAnimationFrame(() => document.body.classList.add("is-visible"));
      });
    };
    window.seedraftHoldOverlayHide = hideOverlayNow;

    const releaseMicStream = () => {
      try { sourceNode?.disconnect?.(); } catch {}
      sourceNode = null;
      analyser = null;
      audioData = null;
      if (state.stream) {
        state.stream.getTracks().forEach((track) => track.stop());
      }
      state.stream = null;
    };

    const buildAudioConstraints = () => {
      const deviceId = storageValue(MICROPHONE_DEVICE_KEY);
      return deviceId ? { deviceId: { exact: deviceId } } : true;
    };

    const getMicStream = async () => {
      const constraints = buildAudioConstraints();
      try {
        return await navigator.mediaDevices.getUserMedia({ audio: constraints });
      } catch (error) {
        const canFallback = !!constraints?.deviceId?.exact && [
          "NotFoundError",
          "OverconstrainedError",
          "ConstraintNotSatisfiedError",
          "NotReadableError"
        ].includes(error?.name);
        if (!canFallback) throw error;
        return await navigator.mediaDevices.getUserMedia({ audio: true });
      }
    };

    const attachAnalyser = async (stream) => {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      if (!audioContext) audioContext = new AudioCtx();
      await audioContext.resume?.();
      try { sourceNode?.disconnect?.(); } catch {}
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 1024;
      analyser.smoothingTimeConstant = 0.72;
      audioData = new Uint8Array(analyser.fftSize);
      sourceNode = audioContext.createMediaStreamSource(stream);
      sourceNode.connect(analyser);
    };

    const resizeCanvas = () => {
      const scale = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      const width = Math.max(1, Math.floor(rect.width * scale));
      const height = Math.max(1, Math.floor(rect.height * scale));
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
      return { width, height, scale };
    };

    const draw = (time) => {
      const { width, height, scale } = resizeCanvas();
      ctx.clearRect(0, 0, width, height);

      if (analyser && audioData) {
        analyser.getByteTimeDomainData(audioData);
      }
      const step = width / bars;
      const sampleSpan = audioData ? Math.max(1, Math.floor(audioData.length / bars)) : 1;
      const minH = 3 * scale;
      const maxH = height - 4 * scale;
      const barW = Math.max(2 * scale, step - 3 * scale);
      const radius = Math.min(barW / 2, 2 * scale);
      for (let i = 0; i < bars; i++) {
        let level = 0.04;
        if (audioData) {
          let sum = 0;
          const start = i * sampleSpan;
          for (let j = 0; j < sampleSpan; j++) {
            const sample = (audioData[start + j] || 128) - 128;
            sum += sample * sample;
          }
          level = Math.min(1, Math.sqrt(sum / sampleSpan) / 54);
        } else {
          const phase = time * 0.004 + i * 0.58;
          level = 0.04 + Math.abs(Math.sin(phase) * Math.cos(phase * 0.37)) * 0.16;
        }
        levels[i] = levels[i] * 0.7 + level * 0.3;
        const h = Math.max(minH, Math.min(maxH, levels[i] * maxH * 1.3 + minH));
        const x = i * step + (step - barW) / 2;
        const y = (height - h) / 2;
        ctx.fillStyle = "rgba(232, 234, 238, 0.92)";
        if (ctx.roundRect) {
          ctx.beginPath();
          ctx.roundRect(x, y, barW, h, radius);
          ctx.fill();
        } else {
          ctx.fillRect(x, y, barW, h);
        }
      }
      requestAnimationFrame(draw);
    };

    const convertBlobToWav = async (blob) => {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) throw new Error("AudioContext is not available");

      const arrayBuffer = await blob.arrayBuffer();
      const decodeCtx = new AudioCtx();
      const decoded = await new Promise((resolve, reject) => {
        decodeCtx.decodeAudioData(
          arrayBuffer.slice(0),
          (buffer) => resolve(buffer),
          (error) => reject(error || new Error("decodeAudioData failed"))
        );
      });

      const sourceChannels = decoded.numberOfChannels;
      const sourceLength = decoded.length;
      const mono = new Float32Array(sourceLength);
      for (let ch = 0; ch < sourceChannels; ch++) {
        const data = decoded.getChannelData(ch);
        for (let i = 0; i < sourceLength; i++) mono[i] += data[i];
      }
      if (sourceChannels > 1) {
        for (let i = 0; i < sourceLength; i++) mono[i] /= sourceChannels;
      }

      const targetRate = 16000;
      const sourceRate = decoded.sampleRate;
      let pcm;
      if (sourceRate === targetRate) {
        pcm = mono;
      } else {
        const ratio = sourceRate / targetRate;
        const outLength = Math.floor(sourceLength / ratio);
        pcm = new Float32Array(outLength);
        for (let i = 0; i < outLength; i++) {
          const srcPos = i * ratio;
          const idx = Math.floor(srcPos);
          const frac = srcPos - idx;
          const a = mono[idx] || 0;
          const b = mono[Math.min(idx + 1, sourceLength - 1)] || 0;
          pcm[i] = a + (b - a) * frac;
        }
      }

      decodeCtx.close?.();

      const numSamples = pcm.length;
      const bytesPerSample = 2;
      const dataSize = numSamples * bytesPerSample;
      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);
      const writeString = (offset, value) => {
        for (let i = 0; i < value.length; i++) {
          view.setUint8(offset + i, value.charCodeAt(i));
        }
      };

      writeString(0, "RIFF");
      view.setUint32(4, 36 + dataSize, true);
      writeString(8, "WAVE");
      writeString(12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, targetRate, true);
      view.setUint32(28, targetRate * bytesPerSample, true);
      view.setUint16(32, bytesPerSample, true);
      view.setUint16(34, 16, true);
      writeString(36, "data");
      view.setUint32(40, dataSize, true);

      let offset = 44;
      for (let i = 0; i < numSamples; i++) {
        const sample = Math.max(-1, Math.min(1, pcm[i]));
        view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
        offset += 2;
      }

      return new Blob([buffer], { type: "audio/wav" });
    };

    const transcribeHoldRecording = async (rawBlob, mimeType) => {
      let audioBlob = rawBlob;
      let fileName = "hold-recording.webm";
      try {
        audioBlob = await convertBlobToWav(rawBlob);
        fileName = "hold-recording.wav";
      } catch (error) {
        console.warn("hold recording WAV conversion failed", error);
      }

      const formData = new FormData();
      const language = storageValue(RECOGNITION_LANG_KEY);
      const speechModel = storageValue(SPEECH_MODEL_STORAGE_KEY);
      if (language) formData.append("language", language);
      if (speechModel) formData.append("speech_model", speechModel);
      formData.append("save_as_note", "false");
      formData.append("audio", audioBlob, fileName);

      const response = await fetch("/api/transcribe", { method: "POST", body: formData });
      const rawBody = await response.text();
      let payload = {};
      try {
        payload = rawBody ? JSON.parse(rawBody) : {};
      } catch {
        payload = { error: rawBody };
      }
      if (!response.ok) throw new Error(payload.error || "transcription failed");
      return payload.text || "";
    };

    const completeHoldRecording = async (text) => {
      const trimmed = (text || "").trim();
      if (!trimmed) return;
      const mode = holdRecordOutputMode();
      const invoke = getTauriInvoke();
      if (invoke) {
        await invoke("complete_hold_recording", { input: { text: trimmed, mode } });
      } else if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(trimmed);
      }
    };

    const resetRecordingState = () => {
      state.recorder = null;
      state.chunks = [];
      state.starting = false;
      state.started = false;
      state.stopping = false;
      state.stopRequested = false;
    };

    const handleRecordingStop = async (recorder) => {
      const chunks = state.chunks;
      const mimeType = recorder?.mimeType || "audio/webm";
      resetRecordingState();
      releaseMicStream();
      state.processing = true;
      window.seedraftHoldOverlayShow("processing");

      try {
        const rawBlob = new Blob(chunks, { type: mimeType });
        if (!rawBlob.size) return;
        const text = await transcribeHoldRecording(rawBlob, mimeType);
        await completeHoldRecording(text);
      } catch (error) {
        console.error("hold recording failed", error);
      } finally {
        state.processing = false;
        hideOverlayNow();
        hideNativeOverlay();
      }
    };

    const startHoldRecording = async () => {
      if (state.starting || state.started || state.processing) return;
      window.seedraftHoldOverlayShow("preparing");
      state.starting = true;
      state.stopping = false;
      state.stopRequested = false;
      try {
        if (!navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
          throw new Error("microphone recording is not available");
        }
        const stream = await getMicStream();
        state.stream = stream;
        await attachAnalyser(stream);

        const recorder = new MediaRecorder(stream);
        state.recorder = recorder;
        state.chunks = [];
        recorder.addEventListener("dataavailable", (event) => {
          if (event.data?.size > 0) state.chunks.push(event.data);
        });
        recorder.addEventListener("stop", () => handleRecordingStop(recorder), { once: true });
        recorder.start();

        state.starting = false;
        state.started = true;
        window.seedraftHoldOverlayShow("recording");
        if (state.stopRequested) stopHoldRecording();
      } catch (error) {
        console.error("hold recording start failed", error);
        resetRecordingState();
        releaseMicStream();
        hideOverlayNow();
        hideNativeOverlay();
      }
    };

    const stopHoldRecording = () => {
      state.stopRequested = true;
      const recorder = state.recorder;
      if (state.stopping) return;
      if (recorder?.state === "recording") {
        state.stopping = true;
        try { recorder.requestData?.(); } catch {}
        recorder.stop();
      } else if (!recorder && !state.starting) {
        resetRecordingState();
        releaseMicStream();
        hideOverlayNow();
        hideNativeOverlay();
      }
    };

    window.seedraftHoldOverlayShortcutPress = startHoldRecording;
    window.seedraftHoldOverlayShortcutRelease = stopHoldRecording;
    if (window.__seedraftPendingHoldPress) {
      window.__seedraftPendingHoldPress = false;
      startHoldRecording();
    }
    if (window.__seedraftPendingHoldRelease) {
      window.__seedraftPendingHoldRelease = false;
      stopHoldRecording();
    }

    const setupGlobalShortcutListener = async () => {
      const listen = getTauriListen();
      if (!listen) return;
      try {
        await listen("seedraft:global-shortcut", (event) => {
          const payload = event?.payload;
          if (payload?.action !== "record.hold") return;
          if (payload.state === "pressed") startHoldRecording();
          if (payload.state === "released") stopHoldRecording();
        });
      } catch (error) {
        console.warn("hold overlay shortcut listener failed", error);
      }
    };

    setupGlobalShortcutListener();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
